services:
  postgres:
    image: postgres:16-alpine
    container_name: employee-testing-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: employee_testing
      POSTGRES_USER: employee_testing
      POSTGRES_PASSWORD: employee_testing_password
    ports:
      - "5432:5432"
    volumes:
      - employee-testing-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U employee_testing -d employee_testing"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  employee-testing-postgres-data:
